<!DOCTYPE html>
<html lang="th" data-theme="sky">
<head>
  <script src="js/theme-init.js"></script>
  <!-- V2: ฟอนต์โหลดแบบ non-blocking (preconnect + link) แทน @import -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&family=Sarabun:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="css/core.css">
  <meta charset="UTF-8">
  <!-- V3 Security headers (meta). frame-ancestors/X-Frame-Options ทำงานเฉพาะผ่าน HTTP header — ใช้ frame-buster ใน theme-init.js เสริม -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://www.google.com https://apis.google.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://api.imgbb.com https://i.ibb.co https://*.workers.dev https://www.google.com https://www.gstatic.com https://challenges.cloudflare.com; frame-src https://www.google.com https://*.firebaseapp.com https://challenges.cloudflare.com; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="description" content="Diamond Cute Studio — Admin Dashboard">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Diamond Cute Studio 💎</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="https://i.ibb.co">
  <link rel="dns-prefetch" href="https://promptpay.io">

  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
</head>
<body>
<a href="#main-content" class="skip-link">ข้ามไปยังเนื้อหาหลัก</a>

<!-- Minimal admin navbar -->
<nav class="navbar" style="z-index:800">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-icon">💎</span>
      <span class="nav-logo-text">Diamond Cute Studio</span>
    </a>
    <div style="display:flex;align-items:center;gap:0.75rem">
      <span class="badge badge-rose" style="font-size:0.72rem">⚙️ Admin</span>
      <button class="btn btn-ghost btn-sm" id="sidebar-toggle" style="display:none">☰</button>
      <button class="btn btn-danger btn-sm" id="logout-btn">🚪 ออก</button>
    </div>
  </div>
</nav>

<div id="admin-dashboard" class="admin-shell">
  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="admin-sidebar-inner">

      <div class="sidebar-section">
        <div class="sidebar-section-label">ภาพรวม</div>
        <div class="sidebar-item active" data-section="overview">
          <span class="sidebar-item-icon">📊</span> Dashboard
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-label">ออเดอร์</div>
        <div class="sidebar-item" data-section="orders">
          <span class="sidebar-item-icon">📦</span> ออเดอร์ทั้งหมด
          <span class="sidebar-badge" id="pending-badge" style="display:none">0</span>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-label">สินค้า</div>
        <div class="sidebar-item" data-section="products">
          <span class="sidebar-item-icon">🛍️</span> จัดการสินค้า
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-label">คอนเทนต์</div>
        <div class="sidebar-item" data-section="gallery">
          <span class="sidebar-item-icon">🖼️</span> ตัวอย่างงาน
        </div>
        <div class="sidebar-item" data-section="reviews">
          <span class="sidebar-item-icon">⭐</span> รีวิว
        </div>
        <div class="sidebar-item" data-section="contacts">
          <span class="sidebar-item-icon">📬</span> กล่องข้อความ
          <span class="sidebar-badge" id="contacts-badge" style="display:none">!</span>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">หน้าเว็บ</div>
        <div class="sidebar-item" data-section="content">
          <span class="sidebar-item-icon">📝</span> เนื้อหาเว็บไซต์
        </div>
        <div class="sidebar-item" data-section="coupons">
          <span class="sidebar-item-icon">🎟️</span> คูปองส่วนลด
        </div>
        <div class="sidebar-item" data-section="templates">
          <span class="sidebar-item-icon">🎨</span> เทมเพลต
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">ระบบ</div>
        <div class="sidebar-item" data-section="settings">
          <span class="sidebar-item-icon">⚙️</span> ตั้งค่า
        </div>
        <div class="sidebar-item danger" id="logout-btn-2">
          <span class="sidebar-item-icon">🚪</span> ออกจากระบบ
        </div>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="sidebar-avatar">👤</div>
      <div>
        <div class="sidebar-user-name">Admin</div>
        <div class="sidebar-user-role">Diamond Cute Studio</div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-main" id="main-content" tabindex="-1">
    <div id="admin-content">
      <div style="text-align:center;padding:4rem;color:var(--text-muted)">
        <span class="spinner" style="display:block;margin:0 auto 0.75rem"></span>
        กำลังโหลด...
      </div>
    </div>
  </main>
</div>

<!-- Modal Overlay -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/loading.js" defer></script>
<script src="js/config.js" defer></script>
<script src="js/utils.js" defer></script>
<script src="js/cms.js" defer></script>
<script src="js/categories.js" defer></script>
<script src="js/custom-select.js" defer></script>
<script src="js/admin-core.js" defer></script>
<script src="js/admin-snapshot.js" defer></script>
<script src="js/admin-overview.js" defer></script>
<script src="js/admin-orders.js" defer></script>
<script src="js/admin-products.js" defer></script>
<script src="js/admin-gallery.js" defer></script>
<script src="js/admin-contacts.js" defer></script>
<script src="js/admin-reviews.js" defer></script>
<script src="js/admin-content.js" defer></script>
<script src="js/admin-coupons.js" defer></script>
<script src="js/admin-templates.js" defer></script>
<script src="js/admin-settings.js" defer></script>
<script src="js/admin-nav.js" defer></script>
<script src="js/admin-page.js" defer></script>
</body>
</html>
