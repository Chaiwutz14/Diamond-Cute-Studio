<!DOCTYPE html>
<html lang="th" data-theme="sky">
<head>
  <meta charset="UTF-8">
  <!-- V3 Security headers (meta). frame-ancestors/X-Frame-Options ทำงานเฉพาะผ่าน HTTP header — ใช้ frame-buster ใน theme-init.js เสริม -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://www.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://api.imgbb.com https://i.ibb.co https://*.workers.dev https://www.google.com https://www.gstatic.com; frame-src https://www.google.com https://*.firebaseapp.com; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="description" content="ไม่พบหน้าที่ต้องการ — Diamond Cute Studio 💎">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>ไม่พบหน้า — Diamond Cute Studio 💎</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#7c5cff">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="DMC Studio">

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="https://i.ibb.co">
  <link rel="dns-prefetch" href="https://promptpay.io">

  <script src="js/theme-init.js"></script>
  <!-- V2: ฟอนต์โหลดแบบ non-blocking (preconnect + link) แทน @import -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&family=Sarabun:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
  <style>
    .not-found {
      min-height: 100svh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      background: var(--bg);
      flex-direction: column; gap: 1rem;
    }
    .nf-code {
      font-size: clamp(5rem, 15vw, 9rem);
      font-family: var(--font-display);
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .nf-emoji { font-size: 3rem; }
    .nf-title { font-size: 1.5rem; font-weight: 700; color: var(--text-1); }
    .nf-desc  { color: var(--text-2); font-size: 1rem; max-width: 360px; line-height: 1.6; }
    .nf-btns  { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; margin-top: .5rem; }
  </style>
</head>
<body>
<a href="#main-content" class="skip-link">ข้ามไปยังเนื้อหาหลัก</a>
<div id="navbar-mount"></div>

<div class="not-found" id="main-content" tabindex="-1">
  <div class="nf-emoji">😕</div>
  <div class="nf-code">404</div>
  <div class="nf-title">ไม่พบหน้าที่คุณต้องการ</div>
  <p class="nf-desc">หน้าที่คุณเปิดอาจถูกลบ ย้าย หรือ URL ไม่ถูกต้อง</p>
  <div class="nf-btns">
    <a href="index.html"   class="btn btn-primary btn-lg">🏠 กลับหน้าแรก</a>
    <a href="catalog.html" class="btn btn-secondary btn-lg">🛍️ ดูสินค้า</a>
    <a href="contact.html" class="btn btn-ghost btn-lg">💬 ติดต่อเรา</a>
  </div>
</div>

<script src="js/loading.js" defer></script>
<script src="js/config.js" defer></script>
<script src="js/utils.js" defer></script>
<script src="js/cms.js" defer></script>
<script src="js/navbar.js" defer></script>
<script src="js/theme-switcher.js" defer></script>

<script src="js/sw-register.js" defer></script>
<script src="js/pwa-install.js" defer></script>
</body>
</html>
