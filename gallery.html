<!DOCTYPE html>
<html lang="th" data-theme="sky">
<head>
  <meta charset="UTF-8">
    <meta property="og:title" content="ตัวอย่างงาน — Diamond Cute Studio 💎">
  <meta property="og:description" content="Diamond Cute Studio 💎 — ตัวอย่างผลงานจริงจากลูกค้า โพลารอยด์ นามบัตร บัตรแขวนคอ">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://chaiwutz14.github.io/Diamond-Cute-Studio/assets/og-image.jpg">
  <meta name="description" content="Diamond Cute Studio 💎 — ตัวอย่างผลงานจริงจากลูกค้า โพลารอยด์ นามบัตร บัตรแขวนคอ">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตัวอย่างงาน — Diamond Cute Studio 💎</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#7c5cff">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="DMC Studio">

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="https://i.ibb.co">
  <link rel="dns-prefetch" href="https://promptpay.io">

  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/loading.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
  <style>
    .gallery-wrapper { max-width: 1200px; margin: 0 auto; padding: calc(var(--nav-h) + 2rem) 1.5rem 4rem; }
    .page-hero { text-align: center; margin-bottom: 2.5rem; }
    .page-hero h1 { font-size: clamp(1.8rem,4vw,2.5rem); font-weight: 800; margin-bottom: .6rem; }
    .page-hero p  { color: var(--text-2); }

    /* Category tabs */
    .gallery-tabs {
      display: flex; gap: .5rem; flex-wrap: wrap; justify-content: center;
      margin-bottom: 2rem;
    }
    .gallery-tab {
      padding: .42rem 1.1rem; border-radius: var(--r-pill);
      border: 1.5px solid var(--border);
      font-family: var(--font-display); font-size: .84rem;
      cursor: pointer; transition: all .15s;
      background: transparent; color: var(--text-2);
    }
    .gallery-tab:hover  { border-color: var(--accent); color: var(--accent); }
    .gallery-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Masonry grid */
    .gallery-grid {
      columns: 4; column-gap: 1rem;
    }
    .gallery-item {
      break-inside: avoid; margin-bottom: 1rem;
      border-radius: var(--r-xl); overflow: hidden;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      cursor: pointer; transition: all .25s;
      position: relative;
    }
    .gallery-item:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--accent); }

    .gallery-img {
      width: 100%;
      background: var(--bg-mid);
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem;
    }
    .gallery-emoji-ph { font-size: 3.5rem; line-height: 1; }
    .gallery-img.tall  { aspect-ratio: 3/4; }
    .gallery-img.wide  { aspect-ratio: 4/3; }
    .gallery-img img   { width: 100%; height: 100%; object-fit: cover; }

    .gallery-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.6), transparent 50%);
      opacity: 0; transition: opacity .25s;
      display: flex; align-items: flex-end; padding: .75rem;
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-overlay-text { color: #fff; font-family: var(--font-display); font-size: .82rem; font-weight: 600; }

    .gallery-caption { padding: .65rem .85rem; }
    .gallery-cat  { font-size: .7rem; color: var(--accent); font-family: var(--font-display); font-weight: 600; text-transform: uppercase; margin-bottom: .2rem; }
    .gallery-name { font-family: var(--font-display); font-weight: 600; font-size: .88rem; color: var(--text-1); }

    /* Lightbox */
    .lightbox {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,.92); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .lightbox.open { display: flex; }
    .lightbox-img  { max-width: 90vw; max-height: 85vh; border-radius: var(--r-xl); object-fit: contain; }
    .lightbox-close {
      position: absolute; top: 1.25rem; right: 1.25rem;
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(255,255,255,.12); border: none; color: #fff;
      font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,.25); }
    .lightbox-emoji { font-size: 8rem; }

    .empty-gallery {
      text-align: center; padding: 4rem 1.5rem; color: var(--text-3);
      grid-column: 1/-1;
    }
    .empty-gallery h3 { font-size: 1.1rem; margin-bottom: .5rem; color: var(--text-2); }

    @media(max-width:900px){ .gallery-grid{ columns: 3; } }
    @media(max-width:640px){ .gallery-grid{ columns: 2; } }
    @media(max-width:400px){ .gallery-grid{ columns: 1; } }
  </style>
</head>
<body>
<div id="navbar-mount"></div>

<div class="gallery-wrapper">
  <div class="page-hero anim-fade-up">
    <div style="font-size:3rem;margin-bottom:.75rem">🖼️</div>
    <h1>ตัวอย่างงาน</h1>
    <p>ผลงานจริงจากลูกค้า คุณภาพที่คุณมั่นใจได้</p>
  </div>

  <!-- Tabs -->
  <div class="gallery-tabs" id="gallery-tabs">
    <button class="gallery-tab active" data-cat="all">ทั้งหมด</button>
    <button class="gallery-tab" data-cat="polaroid">📸 โพลารอยด์</button>
    <button class="gallery-tab" data-cat="lanyard">🪪 บัตรแขวนคอ</button>
    <button class="gallery-tab" data-cat="business-card">💼 นามบัตร</button>
    <button class="gallery-tab" data-cat="shop-sign">🏪 ป้ายร้านค้า</button>
    <button class="gallery-tab" data-cat="qrcode">📱 QR Code</button>
    <button class="gallery-tab" data-cat="doll-tag">🧸 ป้ายตุ๊กตา</button>
  </div>

  <!-- Gallery Grid -->
  <div class="gallery-grid" id="gallery-grid"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close">✕</button>
  <div id="lightbox-content"></div>
</div>

<div id="footer-mount"></div>
<div id="toast-container"></div>
<script src="js/loading.js"></script>
<script src="js/utils.js"></script>
<script src="js/cms.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/bottom-nav.js"></script>
<script src="js/theme-switcher.js"></script>
<script src="js/admin-access.js"></script>
<script>
'use strict';

// ─── หมวดหมู่เริ่มต้น (จะถูกแทนด้วย categories จาก Firestore ถ้ามี) ───
var CAT_LABELS = {
  polaroid:'โพลารอยด์', lanyard:'บัตรแขวนคอ', 'business-card':'นามบัตร',
  'shop-sign':'ป้ายร้านค้า', qrcode:'QR Code', 'doll-tag':'ป้ายตุ๊กตา',
  'student-card':'บัตรนักเรียน'
};

// ─── รูปตัวอย่าง demo (ใช้เฉพาะตอนร้านยังไม่เพิ่มรูปจริง) ───
var DEMO_ITEMS = [
  { cat:'polaroid', name:'โพลารอยด์ขอบขาว', emoji:'📸', size:'tall', _demo:true },
  { cat:'business-card', name:'นามบัตรเคลือบมัน', emoji:'💼', size:'wide', _demo:true },
  { cat:'qrcode', name:'ป้าย QR PromptPay', emoji:'📱', _demo:true },
  { cat:'business-card', name:'นามบัตรด้าน Matte', emoji:'🗒️', _demo:true },
  { cat:'polaroid', name:'โพลารอยด์ Square', emoji:'📷', _demo:true },
  { cat:'shop-sign', name:'ป้ายชื่อร้าน', emoji:'🏪', size:'tall', _demo:true },
  { cat:'doll-tag', name:'ป้ายตุ๊กตาหัวดุ๊กดิ๊ก', emoji:'🧸', _demo:true },
  { cat:'lanyard', name:'บัตรนักเรียน', emoji:'🪪', _demo:true },
];

var GALLERY_ITEMS = DEMO_ITEMS.slice();
var _currentCat = 'all';

// ─── normalize: รองรับ field เก่า/ใหม่ (image, imageUrl, url) ───
function normItem(raw, id) {
  return {
    id: id || raw.id || '',
    cat: raw.cat || raw.category || 'other',
    name: raw.name || raw.title || 'ผลงาน',
    image: raw.image || raw.imageUrl || raw.url || '',
    emoji: raw.emoji || '🖼️',
    size: raw.size || '',
    createdAt: raw.createdAt || null,
  };
}

function renderGallery(cat) {
  _currentCat = cat;
  var grid = document.getElementById('gallery-grid');
  if (!grid) return;
  var items = (cat === 'all') ? GALLERY_ITEMS : GALLERY_ITEMS.filter(function(i){ return i.cat === cat; });

  if (items.length === 0) {
    grid.innerHTML = '<div class="empty-gallery" style="grid-column:1/-1;text-align:center;padding:2.5rem 1rem;color:var(--text-2)">'
      + '<div style="font-size:2.5rem;margin-bottom:.75rem">🔍</div>'
      + '<h3>ยังไม่มีตัวอย่างงานในหมวดนี้</h3>'
      + '<p style="margin-top:.4rem">ติดต่อเราผ่าน LINE เพื่อดูตัวอย่างเพิ่มเติม</p></div>';
    return;
  }

  grid.innerHTML = items.map(function(item, i){
    var inner = item.image
      ? '<img src="'+item.image+'" alt="'+esc(item.name)+'" loading="lazy" data-emoji="'+esc(item.emoji)+'">'
      : '<span class="gallery-emoji-ph">'+item.emoji+'</span>';
    return '<div class="gallery-item" data-idx="'+i+'" data-cat="'+esc(item.cat)+'">'
      + '<div class="gallery-img '+(item.size||'')+'">' + inner + '</div>'
      + '<div class="gallery-overlay"><div class="gallery-overlay-text">🔍 ดูเต็ม</div></div>'
      + '<div class="gallery-caption">'
      + '<div class="gallery-cat">'+esc(CAT_LABELS[item.cat]||item.cat)+'</div>'
      + '<div class="gallery-name">'+esc(item.name)+'</div>'
      + '</div></div>';
  }).join('');

  if (typeof Loading !== 'undefined') Loading.staggerItems('#gallery-grid .gallery-item', 55);

  grid.querySelectorAll('.gallery-item').forEach(function(el){
    el.addEventListener('click', function(){
      var item = items[parseInt(el.dataset.idx)];
      var lbc = document.getElementById('lightbox-content');
      lbc.innerHTML = item.image
        ? '<img class="lightbox-img" src="'+item.image+'" alt="'+esc(item.name)+'">'
        : '<div class="lightbox-emoji">'+item.emoji+'</div>';
      document.getElementById('lightbox').classList.add('open');
    });
  });
}

function esc(s){ return typeof DMC!=='undefined' ? DMC.escapeHtml(s) : String(s||''); }

// ─── สร้างแท็บหมวดหมู่จาก categories (dynamic) ───
function rebuildTabs(cats) {
  var wrap = document.getElementById('gallery-tabs');
  if (!wrap || !cats || !cats.length) return;
  var html = '<button class="gallery-tab active" data-cat="all">ทั้งหมด</button>';
  cats.forEach(function(cat){
    CAT_LABELS[cat.id] = cat.name;
    html += '<button class="gallery-tab" data-cat="'+esc(cat.id)+'">'+(cat.emoji?cat.emoji+' ':'')+esc(cat.name)+'</button>';
  });
  wrap.innerHTML = html;
  bindTabs();
}

function bindTabs() {
  document.querySelectorAll('.gallery-tab').forEach(function(tab){
    tab.addEventListener('click', function(){
      document.querySelectorAll('.gallery-tab').forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      renderGallery(tab.dataset.cat);
    });
  });
}

// Lightbox close
document.getElementById('lightbox-close').addEventListener('click', function(){
  document.getElementById('lightbox').classList.remove('open');
});
document.getElementById('lightbox').addEventListener('click', function(e){
  if (e.target === this) this.classList.remove('open');
});
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
});

// ─── โหลดข้อมูล: วาด demo ทันที แล้วค่อยแทนด้วยของจริง ───
document.addEventListener('DOMContentLoaded', function(){
  bindTabs();
  renderGallery('all');   // วาดทันที — ไม่มีทางหน้าว่าง

  // โหลด categories + gallery แบบเบื้องหลัง
  (async function(){
    if (typeof DMC === 'undefined') return;
    try {
      var db = await DMC.getFirebaseReady();

      // categories (สำหรับแท็บ dynamic)
      try {
        var catSnap = await db.collection('categories').get();
        if (!catSnap.empty) {
          var cats = [];
          catSnap.forEach(function(d){ var x = d.data(); cats.push({ id: x.slug||d.id, name: x.name||d.id, emoji: x.emoji||'' }); });
          rebuildTabs(cats);
        }
      } catch(e) {}

      // gallery items (รูปจริง) — ไม่กรอง active เพื่อรองรับข้อมูลเก่า
      var snap = await db.collection('gallery').limit(100).get();
      if (!snap.empty) {
        var real = [];
        snap.forEach(function(doc){
          var x = doc.data();
          if (x.active === false) return;           // ซ่อนเฉพาะที่ปิดชัดเจน
          real.push(normItem(x, doc.id));
        });
        if (real.length) {
          real.sort(function(a,b){ return (b.createdAt&&b.createdAt.seconds||0)-(a.createdAt&&a.createdAt.seconds||0); });
          GALLERY_ITEMS = real;                     // รูปจริงแทน demo ทั้งหมด
          renderGallery(_currentCat);
        }
      }
    } catch(e) { /* ออฟไลน์/พลาด → คง demo ไว้ */ }
  })();
});
</script>
<script src="js/sw-register.js"></script>
<script src="js/pwa-install.js"></script>
</body>
</html>
