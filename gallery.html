  <style>
    .gallery-wrapper { max-width: 1200px; margin: 0 auto; padding: calc(var(--nav-h) + 2rem) 1.5rem 4rem; }
    .page-hero { text-align: center; margin-bottom: 2.5rem; }
    .page-hero h1 { font-size: clamp(1.8rem,4vw,2.5rem); font-weight: 800; margin-bottom: .6rem; }
    .page-hero p  { color: var(--text-2); }

    /* Category tabs */
    .gallery-tabs {
      display: flex; gap: .5rem; flex-wrap: wrap; justify-content: center;
      margin-bottom: 2rem;
    }
    .gallery-tab {
      padding: .42rem 1.1rem; border-radius: var(--r-pill);
      border: 1.5px solid var(--border);
      font-family: var(--font-display); font-size: .84rem;
      cursor: pointer; transition: all .15s;
      background: transparent; color: var(--text-2);
    }
    .gallery-tab:hover  { border-color: var(--accent); color: var(--accent); }
    .gallery-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Masonry grid */
    .gallery-grid {
      columns: 4; column-gap: 1rem;
    }
    .gallery-item {
      break-inside: avoid; margin-bottom: 1rem;
      border-radius: var(--r-xl); overflow: hidden;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      cursor: pointer; transition: all .25s;
      position: relative;
    }
    .gallery-item:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); border-color: var(--accent); }

    .gallery-img {
      width: 100%;
      background: var(--bg-mid);
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem;
    }
    .gallery-emoji-ph { font-size: 3.5rem; line-height: 1; }
    .gallery-img.tall  { aspect-ratio: 3/4; }
    .gallery-img.wide  { aspect-ratio: 4/3; }
    .gallery-img img   { width: 100%; height: 100%; object-fit: cover; }

    .gallery-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.6), transparent 50%);
      opacity: 0; transition: opacity .25s;
      display: flex; align-items: flex-end; padding: .75rem;
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-overlay-text { color: #fff; font-family: var(--font-display); font-size: .82rem; font-weight: 600; }

    .gallery-caption { padding: .65rem .85rem; }
    .gallery-cat  { font-size: .7rem; color: var(--accent); font-family: var(--font-display); font-weight: 600; text-transform: uppercase; margin-bottom: .2rem; }
    .gallery-name { font-family: var(--font-display); font-weight: 600; font-size: .88rem; color: var(--text-1); }

    /* Lightbox */
    .lightbox {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,.92); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .lightbox.open { display: flex; }
    .lightbox-img  { max-width: 90vw; max-height: 85vh; border-radius: var(--r-xl); object-fit: contain; }
    .lightbox-close {
      position: absolute; top: 1.25rem; right: 1.25rem;
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(255,255,255,.12); border: none; color: #fff;
      font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,.25); }
    .lightbox-emoji { font-size: 8rem; }

    .empty-gallery {
      text-align: center; padding: 4rem 1.5rem; color: var(--text-3);
      grid-column: 1/-1;
    }
    .empty-gallery h3 { font-size: 1.1rem; margin-bottom: .5rem; color: var(--text-2); }

    @media(max-width:900px){ .gallery-grid{ columns: 3; } }
    @media(max-width:640px){ .gallery-grid{ columns: 2; } }
    @media(max-width:400px){ .gallery-grid{ columns: 1; } }
  </style>
</head>
<body>
<a href="#main-content" class="skip-link">ข้ามไปยังเนื้อหาหลัก</a>
<div id="navbar-mount"></div>

<div class="gallery-wrapper" id="main-content" tabindex="-1">
  <div class="page-hero anim-fade-up">
    <div style="font-size:3rem;margin-bottom:.75rem">🖼️</div>
    <h1 data-edit="pages.gallery.title" data-edit-label="หัวข้อหน้า">ตัวอย่างงาน</h1>
    <p data-edit="pages.gallery.subtitle" data-edit-label="คำโปรย">ผลงานจริงจากลูกค้า คุณภาพที่คุณมั่นใจได้</p>
  </div>

  <!-- Tabs -->
  <div class="gallery-tabs" id="gallery-tabs">
    <button class="gallery-tab active" data-cat="all">ทั้งหมด</button>
    <button class="gallery-tab" data-cat="polaroid">📸 โพลารอยด์</button>
    <button class="gallery-tab" data-cat="lanyard">🪪 บัตรแขวนคอ</button>
    <button class="gallery-tab" data-cat="business-card">💼 นามบัตร</button>
    <button class="gallery-tab" data-cat="shop-sign">🏪 ป้ายร้านค้า</button>
    <button class="gallery-tab" data-cat="qrcode">📱 QR Code</button>
    <button class="gallery-tab" data-cat="doll-tag">🧸 ป้ายตุ๊กตา</button>
  </div>

  <!-- Gallery Grid -->
  <div class="gallery-grid" id="gallery-grid"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close" aria-label="ปิด">✕</button>
  <div id="lightbox-content"></div>
