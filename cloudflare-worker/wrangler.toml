name = "dmc-studio-notify"
main = "index.js"
compatibility_date = "2024-09-23"

# Secrets (set via Dashboard → Settings → Variables and Secrets, หรือ wrangler secret put)
#   LINE_TOKEN     = Channel Access Token (จำเป็น)
#   LINE_USER_ID   = User ID (U...) — หลายคนคั่นด้วย ,  → ระบบใช้ multicast ให้อัตโนมัติ
#   IMGBB_KEY      = ImgBB API key (สำหรับ /upload — key ไม่หลุดสู่หน้าเว็บ)
#   ALLOWED_ORIGIN = (ออปชัน) เช่น "https://chaiwutz14.github.io" คั่น , ได้ — จำกัดคนยิง Worker
#
#   ── ตรวจสลิปกับธนาคาร (ออปชัน /verify-slip — เปิดเมื่อต้องการตรวจยอด/ผู้รับจริง) ──
#   SLIP_VERIFY_KEY      = API key ของผู้ให้บริการ (EasySlip = Bearer token / SlipOK = x-authorization)
#   SLIP_VERIFY_PROVIDER = "easyslip" (ค่าเริ่มต้น) หรือ "slipok"
#   SLIPOK_BRANCH_ID     = (เฉพาะ slipok) Branch ID จากแดชบอร์ด SlipOK
#   ไม่ตั้ง SLIP_VERIFY_KEY = /verify-slip ตอบ ok:null → เว็บใช้ผลตรวจฟรี (อ่าน QR) ต่อไป (ไม่มีค่าใช้จ่าย)
#
#   ── V17 Hardening (ออปชัน) ──
#   CLIENT_KEY     = (ออปชัน) shared secret กับหน้าเว็บ — ต้องใส่ค่าเดียวกันที่ CF_CLIENT_KEY ใน js/config.js
#                    ไม่ตั้ง = ไม่บังคับ (Origin + Rate limit + App Check ยังทำงาน)
#
#   ── V17 สร้างออเดอร์ฝั่งเซิร์ฟเวอร์ (ออปชัน /create-order — ปิดช่องโหว่ราคา CRIT-01) ──
#   GCP_SERVICE_ACCOUNT  = JSON ของ service account ทั้งก้อน (Firebase Console → Project settings →
#                          Service accounts → Generate new private key) — ให้สิทธิ์เขียน Firestore
#   PRODUCTS_SNAPSHOT_URL= URL ของ products.json (เช่น https://chaiwutz14.github.io/Diamond-Cute-Studio/data/products.json)
#   FIREBASE_PROJECT_ID  = (ออปชัน) ถ้าไม่ตั้ง จะอ่าน project_id จาก service account ให้เอง
#   SHIP_TRANSFER / SHIP_COD / FREE_SHIP_MIN / SURCHARGE_PROMPTPAY / SURCHARGE_COD
#                        = (ออปชัน) ค่าส่ง/ธรรมเนียม ให้ตรงกับที่ตั้งใน CMS ก่อนเปิดใช้ /create-order
#   ไม่ตั้ง GCP_SERVICE_ACCOUNT = /create-order ตอบ fallback:true → หน้าเว็บเขียน Firestore ตรงแบบเดิม (ไม่พัง)
#
#   ── V17 เผยแพร่ snapshot อัตโนมัติ (ออปชัน /publish-snapshot) ──
#   GITHUB_TOKEN   = Personal Access Token (สิทธิ์ Contents: read/write เฉพาะ repo นี้)
#   GITHUB_REPO    = "chaiwutz14/Diamond-Cute-Studio"
#   GITHUB_BRANCH  = (ออปชัน) ค่าเริ่มต้น "main"
#   ไม่ตั้ง GITHUB_TOKEN = /publish-snapshot ตอบ ok:false → แอดมินใช้ปุ่มดาวน์โหลด+อัปเอง (ไม่พัง)
