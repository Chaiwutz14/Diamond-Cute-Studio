<!DOCTYPE html>
<html lang="th" data-theme="sky">
<head>
  <script src="js/theme-init.js"></script>
  <!-- V2: ฟอนต์โหลดแบบ non-blocking (preconnect + link) แทน @import -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800;900&family=Sarabun:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/loading.css">
  <meta charset="UTF-8">
  <!-- V3 Security headers (meta). frame-ancestors/X-Frame-Options ทำงานเฉพาะผ่าน HTTP header — ใช้ frame-buster ใน theme-init.js เสริม -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://www.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://api.imgbb.com https://i.ibb.co https://*.workers.dev https://www.google.com https://www.gstatic.com; frame-src https://www.google.com https://*.firebaseapp.com; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="สินค้าทั้งหมด — Diamond Cute Studio 💎">
  <meta property="og:description" content="Diamond Cute Studio 💎 — สินค้าพิมพ์ภาพครบวงจร โพลารอยด์ นามบัตร บัตรแขวนคอ ป้ายร้านค้า QR Code">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://chaiwutz14.github.io/Diamond-Cute-Studio/assets/og-image.jpg">
  <meta name="description" content="สินค้าทั้งหมด — Diamond Cute Studio 💎 โพลารอยด์ นามบัตร บัตรแขวนคอ ป้ายร้านค้า QR Code">
  <title>สินค้าทั้งหมด — Diamond Cute Studio 💎</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#7c5cff">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="DMC Studio">

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="https://i.ibb.co">
  <link rel="dns-prefetch" href="https://promptpay.io">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/product.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
</head>
<body>
<a href="#main-content" class="skip-link">ข้ามไปยังเนื้อหาหลัก</a>

<div id="navbar-mount"></div>

<!-- Page Header -->
<div class="page-header">
  <div class="page-header-inner">
    <nav class="breadcrumb">
      <a href="index.html">หน้าแรก</a>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-current">สินค้าทั้งหมด</span>
    </nav>
    <h1 style="font-size:1.6rem;font-weight:800">🛍️ สินค้าทั้งหมด</h1>
  </div>
</div>

<!-- Catalog Layout -->
<div class="catalog-wrapper">

  <!-- Mobile Category Dropdown (มือถือ) -->
  <div class="filter-mobile-dropdown">
    <select class="filter-mobile-select" id="mobile-cat-select" data-custom data-title="เลือกหมวดหมู่">
      <option value="">📂 ทุกหมวดหมู่</option>
      <option value="polaroid">📸 โพลารอยด์</option>
      <option value="lanyard">🪪 บัตรแขวนคอ</option>
      <option value="business-card">💼 นามบัตร</option>
      <option value="shop-sign">🏪 ป้ายร้านค้า</option>
      <option value="qrcode">📱 QR Code</option>
      <option value="doll-tag">🧸 ป้ายตุ๊กตา</option>
      <option value="student-card">🎓 บัตรนักเรียน</option>
    </select>
  </div>

  <!-- Filter Sidebar -->
  <aside class="filter-sidebar">

    <div class="filter-panel">
      <div class="filter-panel-title">📂 หมวดหมู่</div>
      <div class="filter-list" id="cat-filter-list">
        <div class="filter-item active" data-cat="">
          ทั้งหมด <span class="filter-item-count" id="count-all">—</span>
        </div>
        <div class="filter-item" data-cat="polaroid">
          📸 โพลารอยด์ <span class="filter-item-count">—</span>
        </div>
        <div class="filter-item" data-cat="lanyard">
          🪪 บัตรแขวนคอ <span class="filter-item-count">—</span>
        </div>
        <div class="filter-item" data-cat="business-card">
          💼 นามบัตร <span class="filter-item-count">—</span>
        </div>
        <div class="filter-item" data-cat="shop-sign">
          🏪 ป้ายร้านค้า <span class="filter-item-count">—</span>
        </div>
        <div class="filter-item" data-cat="qrcode">
          📱 QR Code <span class="filter-item-count">—</span>
        </div>
        <div class="filter-item" data-cat="doll-tag">
          🧸 ป้ายตุ๊กตา <span class="filter-item-count">—</span>
        </div>
        <div class="filter-item" data-cat="student-card">
          🎓 บัตรนักเรียน <span class="filter-item-count">—</span>
        </div>
      </div>
    </div>

    <div class="filter-panel">
      <div class="filter-panel-title">💰 ช่วงราคา (฿)</div>
      <div class="price-inputs">
        <input class="price-input form-input" type="number" id="price-min" placeholder="ต่ำสุด" min="0" aria-label="ราคาต่ำสุด">
        <span class="price-sep">—</span>
        <input class="price-input form-input" type="number" id="price-max" placeholder="สูงสุด" min="0" aria-label="ราคาสูงสุด">
      </div>
    </div>

    <div class="filter-panel">
      <div class="filter-panel-title">⚡ ประเภท</div>
      <div class="filter-checkbox-list">
        <label class="filter-checkbox">
          <input type="checkbox" id="filter-new"> ✨ สินค้าใหม่
        </label>
        <label class="filter-checkbox">
          <input type="checkbox" id="filter-hot"> 🔥 ขายดี
        </label>
        <label class="filter-checkbox">
          <input type="checkbox" id="filter-sale"> 💰 มีโปรโมชั่น
        </label>
      </div>
    </div>

    <button class="btn btn-primary btn-block btn-md" id="apply-filter-btn" style="border-radius:var(--r-lg)">
      🔍 กรองสินค้า
    </button>
    <button class="btn btn-ghost btn-block btn-md" id="clear-filter-btn" style="margin-top:0.5rem;border-radius:var(--r-lg)">
      ✕ ล้างตัวกรอง
    </button>
  </aside>

  <!-- Main -->
  <main class="catalog-main" id="main-content" tabindex="-1">

    <!-- Search + Sort toolbar -->
    <div class="catalog-toolbar">
      <div class="search-bar">
        <span class="search-bar-icon">🔍</span>
        <input type="text" id="search-input" placeholder="ค้นหาสินค้า เช่น โพลารอยด์, นามบัตร..." aria-label="ค้นหาสินค้า">
      </div>
      <div class="catalog-controls">
        <span class="result-count">พบ <strong id="result-count">—</strong> รายการ</span>
        <div class="sort-select-wrap"><select class="form-input form-select" id="sort-select" data-custom data-title="เรียงลำดับ" style="width:auto;padding:0.45rem 2.2rem 0.45rem 0.75rem">
          <option value="featured">ยอดนิยม</option>
          <option value="price-asc">ราคา ต่ำ→สูง</option>
          <option value="price-desc">ราคา สูง→ต่ำ</option>
          <option value="newest">ใหม่ล่าสุด</option>
        </select>
        </div>
      </div>
    </div>

    <!-- Active filters -->
    <div class="active-filters" id="active-filters" style="display:none"></div>

    <!-- Product Grid -->
    <div class="product-grid" id="catalog-grid">
      <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted)">
        <span class="spinner" style="display:block;margin:0 auto 0.75rem"></span>
        กำลังโหลดสินค้า...
      </div>
    </div>

    <!-- Load More -->
    <div style="text-align:center;margin-top:2rem">
      <button class="btn btn-ghost btn-lg" id="load-more-btn" style="display:none;border-radius:var(--r-lg)">
        โหลดเพิ่ม
      </button>
    </div>
  </main>
</div>

<div id="footer-mount"></div>
<div id="toast-container"></div>
<script src="js/loading.js" defer></script>
<script src="js/config.js" defer></script>
<script src="js/utils.js" defer></script>
<script src="js/custom-select.js" defer></script>
<script src="js/cms.js" defer></script>
<script src="js/categories.js" defer></script>
<script src="js/navbar.js" defer></script>
<script src="js/catalog.js" defer></script>
<script src="js/footer.js" defer></script>
<script src="js/bottom-nav.js" defer></script>
<script src="js/theme-switcher.js" defer></script>
<script src="js/admin-access.js" defer></script>
<script src="js/inline-editor.js" defer></script>
<script src="js/sw-register.js" defer></script>
<script src="js/pwa-install.js" defer></script>
</body>
</html>
